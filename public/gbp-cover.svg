<svg width="1332" height="750" viewBox="0 0 1332 750" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Arrow gradient: dark indigo → bright violet (tip) -->
    <linearGradient id="arrowGrad" x1="595" y1="458" x2="836" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3730A3"/>
      <stop offset="0.5" stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- Badge inner glow (top-right corner of badge) -->
    <radialGradient id="badgeGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(810 248) scale(240 220)">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft glow behind badge (drop shadow effect) -->
    <filter id="badgeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.43 0 0.85 0 0
                0    0 0    0 0
                0.87 0 1.7  0 0
                0    0 0    0.35 0"
        result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrowhead marker (matches violet tip color) -->
    <marker id="arrHead" markerWidth="28" markerHeight="20" refX="26" refY="10"
      orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 28,10 0,20" fill="#8B5CF6"/>
    </marker>

  </defs>

  <!-- ── Background ── -->
  <rect width="1332" height="750" fill="#0A0A12"/>

  <!-- Atmospheric violet glow: top-right -->
  <ellipse cx="1080" cy="70" rx="460" ry="400" fill="#6D28D9" fill-opacity="0.18"/>
  <!-- Atmospheric indigo glow: bottom-left -->
  <ellipse cx="200" cy="710" rx="320" ry="290" fill="#4F46E5" fill-opacity="0.11"/>

  <!-- ── Subtle grid (top-right corner) ── -->
  <g opacity="0.07" stroke="#C4B5FD" stroke-width="1">
    <line x1="940" y1="55"  x2="1295" y2="55"/>
    <line x1="940" y1="97"  x2="1295" y2="97"/>
    <line x1="940" y1="139" x2="1295" y2="139"/>
    <line x1="940" y1="181" x2="1295" y2="181"/>
    <line x1="940" y1="223" x2="1295" y2="223"/>
    <line x1="970"  y1="20" x2="970"  y2="260"/>
    <line x1="1030" y1="20" x2="1030" y2="260"/>
    <line x1="1090" y1="20" x2="1090" y2="260"/>
    <line x1="1150" y1="20" x2="1150" y2="260"/>
    <line x1="1210" y1="20" x2="1210" y2="260"/>
    <line x1="1270" y1="20" x2="1270" y2="260"/>
  </g>

  <!-- ── Corner bracket accents ── -->
  <path d="M1268 28 H1304 V64"  stroke="#8B5CF6" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M28  686 V722 H64"   stroke="#4F46E5" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- ── Badge shadow / glow layer ── -->
  <rect x="446" y="155" width="440" height="440" rx="66"
    fill="#6D28D9" fill-opacity="0.28" filter="url(#badgeShadow)"/>

  <!-- ── Badge background ── -->
  <rect x="446" y="155" width="440" height="440" rx="66" fill="#0D0D1B"/>
  <rect x="446" y="155" width="440" height="440" rx="66"
    stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Badge inner radial glow (top-right area, matching logo) -->
  <rect x="446" y="155" width="440" height="440" rx="66" fill="url(#badgeGlow)"/>

  <!-- ── Badge content ── -->

  <!-- Text: "Built" -->
  <text x="472" y="275"
    fill="#F8FAFC"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="88" font-weight="900" letter-spacing="1">Built</text>

  <!-- Text: "to" -->
  <text x="472" y="366"
    fill="#F8FAFC"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="68" font-weight="900" letter-spacing="1">to</text>

  <!-- Arrow: starts lower-center of badge, sweeps up to top-right -->
  <!-- Dot at arrow base -->
  <circle cx="595" cy="456" r="10" fill="#3730A3"/>
  <!-- Curved path with gradient stroke -->
  <path d="M 595 456 C 648 394, 746 316, 834 230"
    stroke="url(#arrowGrad)" stroke-width="19" stroke-linecap="round"
    fill="none" marker-end="url(#arrHead)"/>

  <!-- Text: "Rank" -->
  <text x="472" y="528"
    fill="#F8FAFC"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="88" font-weight="900" letter-spacing="1">Rank</text>

  <!-- ── URL below badge ── -->
  <text x="666" y="636"
    fill="#8B5CF6"
    font-family="Arial, Helvetica, sans-serif"
    font-size="20" font-weight="700" letter-spacing="4"
    text-anchor="middle">BUILTTORANK.CA</text>

  <!-- Tagline (faint) -->
  <text x="666" y="666"
    fill="rgba(255,255,255,0.32)"
    font-family="Arial, Helvetica, sans-serif"
    font-size="16" font-weight="500" letter-spacing="2.5"
    text-anchor="middle">WEB DESIGN + LOCAL SEO  ·  BRAMPTON, ONTARIO</text>

</svg>
